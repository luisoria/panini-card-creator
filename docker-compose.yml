services:
  backend:
    build: ./backend
    volumes:
      - ./backend/assets:/app/assets
      # Volumen con nombre: el modelo sobrevive a los redespliegues
      - models:/app/assets/models
    environment:
      - INSWAPPER_MODEL_PATH=/app/assets/models/inswapper_128.onnx
      - FACESWAP_PROVIDER=${FACESWAP_PROVIDER:-insightface}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN:-}
      - MODEL_URL=${MODEL_URL:-https://huggingface.co/ezioruan/inswapper_128.onnx/resolve/main/inswapper_128.onnx}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://open-gravity-panini-card-creator.ogouws.easypanel.host,http://localhost:3000}
      # "head": cabeza completa (pelo+cuello) | "face": solo rostro interior
      - SWAP_MODE=${SWAP_MODE:-head}
      # El modelo de segmentación (u2net) también persiste en el volumen
      - U2NET_HOME=/app/assets/models/u2net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      args:
        # URL PÚBLICA del backend (la usa el navegador, no la red interna de Docker)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://panini-api.ogouws.easypanel.host}
    depends_on:
      - backend

volumes:
  models: