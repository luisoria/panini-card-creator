name: Deploy to EasyPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to EasyPanel Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.EASYPANEL_REGISTRY }}
          username: ${{ secrets.EASYPANEL_USERNAME }}
          password: ${{ secrets.EASYPANEL_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.EASYPANEL_REGISTRY }}/panini-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.EASYPANEL_REGISTRY }}/panini-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max