name: Deploy to EasyPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger EasyPanel deploy
        env:
          DEPLOY_URL: ${{ secrets.EASYPANEL_DEPLOY_URL }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "::warning::Secret EASYPANEL_DEPLOY_URL no configurado; deploy omitido."
            exit 0
          fi
          curl -fsS -m 60 "$DEPLOY_URL"
          echo "Deploy disparado en EasyPanel."
